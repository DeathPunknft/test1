<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>原生代币质押批量查询 - TT Chain</title>
  <script src="/Content/Styles/js/ethers.5.2.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #1a3c5e; }
    textarea { width: 100%; height: 140px; padding: 12px; font-family: monospace; border: 1px solid #ccc; border-radius: 6px; margin: 12px 0; }
    button { padding: 12px 32px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin: 12px 0; }
    button:hover { background: #1557b0; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; }
    .loading { color: #666; font-style: italic; }
    .error { color: #d32f2f; font-weight: bold; }
    .result { margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h1>原生代币质押批量查询</h1>
  
  <p>请输入多个钱包地址，每行一个：</p>
  <textarea id="addresses" placeholder="0x1234...
0x5678...
0x9abc..."></textarea>

  <button id="queryBtn">查询质押数量</button>

  <div id="status" class="loading"></div>

  <div class="result" id="resultTable"></div>
</div>

<script>
  const RPC_URL = "https://rpc.ttchain.info";
  const CONTRACT_ADDRESS = "0xaC804Ec55ef33632c18c1ecFe5fD20D8A32730Ef";  // ← 替换成实际部署的原生质押合约地址

  const provider = new ethers.providers.JsonRpcProvider(RPC_URL);

  // 合约 ABI（只需要 getStakedBalance 函数）
  const ABI = [
    "function getStakedBalance(address user) external view returns (uint256)"
  ];

  const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);

  document.getElementById("queryBtn").addEventListener("click", async () => {
    const btn = document.getElementById("queryBtn");
    const status = document.getElementById("status");
    const resultDiv = document.getElementById("resultTable");

    const input = document.getElementById("addresses").value.trim();
    if (!input) {
      status.innerHTML = '<span class="error">请输入至少一个地址</span>';
      return;
    }

    btn.disabled = true;
    status.innerHTML = "查询中...";
    resultDiv.innerHTML = "";

    const addresses = input.split("\n")
      .map(line => line.trim())
      .filter(line => line && ethers.utils.isAddress(line));

    if (addresses.length === 0) {
      status.innerHTML = '<span class="error">没有有效的以太坊地址</span>';
      btn.disabled = false;
      return;
    }

    let html = `
      <table>
        <thead>
          <tr>
            <th>序号</th>
            <th>钱包地址</th>
            <th>质押数量 (TT)</th>
          </tr>
        </thead>
        <tbody>
    `;

    for (let i = 0; i < addresses.length; i++) {
      const addr = addresses[i];
      try {
        const balanceWei = await contract.getStakedBalance(addr);
        const balanceHuman = ethers.utils.formatEther(balanceWei);
        const formatted = Number(balanceHuman).toFixed(6);

        html += `
          <tr>
            <td>${i + 1}</td>
            <td><code>${addr}</code></td>
            <td>${formatted}</td>
          </tr>
        `;
      } catch (err) {
        html += `
          <tr style="background:#ffebee;">
            <td>${i + 1}</td>
            <td><code>${addr}</code></td>
            <td class="error">查询失败: ${err.message || "未知错误"}</td>
          </tr>
        `;
      }
    }

    html += "</tbody></table>";
    resultDiv.innerHTML = html;
    status.innerHTML = `查询完成，共 ${addresses.length} 个有效地址`;
    btn.disabled = false;
  });
</script>

</body>
</html>
