                <i class="fa fa-users mr-3"></i>CHONG批量提交推荐人地址
            </h1>
            <p class="text-gray-300 mt-2">仅拥有 Chief 权限的地址可执行 - 批量设置 theChiefaddr 授权</p>
        </div>

        <!-- 钱包连接区 -->
        <div class="text-center mb-8">

            </button>

                <p class="text-gray-400 mt-2">是否拥有授权权限：<span id="hasPerm" class="text-yellow-400">查询中...</span></p>
            </div>
        </div>

        <!-- 核心配置区 -->
        <div class="space-y-6 mb-8">
            <!-- 主合约地址 -->
            <div>
                <label class="block text-gray-300 font-bold mb-2 flex items-center">
                    <i class="fa fa-cube mr-2 text-primary"></i>主合约地址
                </label>
                <input 
                    type="text" 
                    id="mainContractAddress" 
                    class="input-large" 
                    placeholder="输入包含 setBacthTheChiefaddr 函数的合约地址"
                    value="0x94772dabb44E8f076abD90aD2e273cd1B5110162"  <!-- 替换为你的实际主合约地址 -->
                >
                <p class="text-gray-400 text-sm mt-2">提示：需输入部署了 setBacthTheChiefaddr 函数的合约地址</p>
            </div>

            <!-- 批量地址输入区 -->
            <div>
                <label class="block text-gray-300 font-bold mb-2 flex items-center">
                    <i class="fa fa-address-book mr-2 text-primary"></i>批量 Chief 地址（支持换行/逗号分隔）
                </label>
                <textarea 
                    id="batchAddresses" 
                    class="textarea-large" 
                    placeholder="示例：
0x1234567890abcdef1234567890abcdef12345678
0x876543210fedcba09876543210fedcba09876543
或用逗号分隔：0x123...,0x876..."></textarea>
                <div class="mt-3">
                    <button id="parseBtn" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded text-sm">
                        <i class="fa fa-magic mr-1"></i>解析地址并验证

                </div>
                <div id="addressList" class="mt-3 flex flex-wrap hidden">
                    <!-- 解析后的有效地址标签会显示在这里 -->
                </div>
            </div>
        </div>

            <button id="submitBtn" class="btn-submit flex-1" disabled>

	{

		"name": "whitelist",

			{
				"internalType": "contract ERC721A",

        // 全局变量
        let web3 = "https://rpc.ttchain.info";
        let currentAccount = null;
        let mainContract = "0x94772dabb44E8f076abD90aD2e273cd1B5110162";
        let validAddresses = []; // 存储解析后的有效地址

        // DOM 元素
        const connectWalletBtn = document.getElementById('connectWalletBtn');
        const walletInfo = document.getElementById('walletInfo');
        const walletAddr = document.getElementById('walletAddr');
        const networkName = document.getElementById('networkName');
        const chainId = document.getElementById('chainId');
        const hasPerm = document.getElementById('hasPerm');
        const mainContractAddress = document.getElementById('mainContractAddress');
        const batchAddresses = document.getElementById('batchAddresses');
        const parseBtn = document.getElementById('parseBtn');
        const addressList = document.getElementById('addressList');
        const validCount = document.getElementById('validCount');
        const invalidCount = document.getElementById('invalidCount');
        const submitBtn = document.getElementById('submitBtn');
        const queryBtn = document.getElementById('queryBtn');
        const statusContainer = document.getElementById('statusContainer');
        const statusContent = document.getElementById('statusContent');

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 检查钱包
            if (window.ethereum) {
                web3 = new Web3(window.ethereum);
                window.ethereum.on('chainChanged', handleChainChanged);
                window.ethereum.on('accountsChanged', handleAccountsChanged);
            } else {
                showStatus('未检测到钱包，请安装 MetaMask 等 EVM 兼容钱包', 'error');
            }

            // 绑定事件
            connectWalletBtn.addEventListener('click', connectWallet);
            parseBtn.addEventListener('click', parseAndValidateAddresses);
            submitBtn.addEventListener('click', submitBatchAuthorize);
            queryBtn.addEventListener('click', queryAuthorizeStatus);
            mainContractAddress.addEventListener('input', initMainContract);
        });

        // 处理网络变化
        function handleChainChanged(chainIdHex) {
            const chainIdNum = web3.utils.hexToNumber(chainIdHex);
            chainId.textContent = chainIdNum;
            networkName.textContent = getNetworkName(chainIdNum);
            initMainContract();
        }

        // 处理账户变化
        function handleAccountsChanged(accounts) {
            if (accounts.length > 0) {
                currentAccount = accounts[0];
                walletAddr.textContent = currentAccount;
                walletInfo.classList.remove('hidden');
                initMainContract();
            } else {
                currentAccount = null;
                walletInfo.classList.add('hidden');
                submitBtn.disabled = true;
                queryBtn.disabled = true;
            }
        }

        // 根据链ID获取网络名称
        function getNetworkName(chainId) {
            const networks = {
                1: '以太坊主网',
                5: 'Goerli 测试网',
                1679: 'TT 链',
                97: 'BSC 测试网',
                56: 'BSC 主网'
            };
            return networks[chainId] || `未知网络（${chainId}）`;
        }

        // 初始化主合约
        async function initMainContract() {
            try {
                const mainAddr = mainContractAddress.value.trim();
                if (!currentAccount || !web3.utils.isAddress(mainAddr)) {
                    submitBtn.disabled = true;
                    queryBtn.disabled = true;
                    hasPerm.textContent = '未就绪';
                    return;
                }

                // 初始化合约实例
                mainContract = new web3.eth.Contract(MAIN_CONTRACT_ABI, mainAddr);
                updateBtnStatus();

                // 检查当前连接地址是否有授权权限（theChiefaddrPerm）
                const perm = await mainContract.methods.referrersPerm(currentAccount).call();
                hasPerm.textContent = perm ? '✅ 已拥有' : '❌ 无权限';
                hasPerm.className = perm ? 'text-green-500' : 'text-red-500';

                showStatus('合约初始化成功', 'success');
            } catch (error) {
                showStatus(`合约初始化失败：${error.message}`, 'error');
                submitBtn.disabled = true;
                queryBtn.disabled = true;
                hasPerm.textContent = '查询失败';
                console.error('初始化合约错误:', error);
            }
        }

        // 解析并验证输入的地址
        function parseAndValidateAddresses() {
            let input = batchAddresses.value.trim();
            if (!input) {
                showStatus('请输入要授权的地址', 'error');
                return;
            }

            // 支持换行、逗号、空格分隔地址
            const addressStrs = input
                .replace(/\n/g, ',') // 换行转逗号
                .replace(/\s+/g, '') // 去除空格
                .split(',') // 按逗号分割
                .filter(str => str !== ''); // 过滤空字符串

            // 验证地址有效性
            validAddresses = [];
            let invalidAddrs = [];
            addressStrs.forEach(str => {
                if (web3.utils.isAddress(str)) {
                    validAddresses.push(str.toLowerCase()); // 转为小写统一格式
                } else {
                    invalidAddrs.push(str);
                }
            });

            // 更新统计和UI
            validCount.textContent = validAddresses.length;
            invalidCount.textContent = invalidAddrs.length;

            // 显示有效地址标签
            addressList.innerHTML = '';
            if (validAddresses.length > 0) {
                addressList.classList.remove('hidden');
                validAddresses.forEach(addr => {
                    const tag = document.createElement('span');
                    tag.className = 'address-tag';
                    tag.innerHTML = `${addr.slice(0, 6)}...${addr.slice(-4)} <i class="fa fa-check text-green-500 ml-1"></i>`;
                    addressList.appendChild(tag);
                });
            } else {
                addressList.classList.add('hidden');
            }

            // 提示无效地址
            if (invalidAddrs.length > 0) {
                showStatus(`发现 ${invalidAddrs.length} 个无效地址：${invalidAddrs.join(', ')}`, 'error');
            } else {
                showStatus(`成功解析 ${validAddresses.length} 个有效地址`, 'success');
            }

            updateBtnStatus();
        }

        // 更新按钮状态
        function updateBtnStatus() {
            const mainAddrValid = web3.utils.isAddress(mainContractAddress.value.trim());
            const hasValidAddrs = validAddresses.length > 0;
            const hasPermission = hasPerm.textContent === '✅ 已拥有';
            
            submitBtn.disabled = !mainAddrValid || !hasValidAddrs || !currentAccount || !mainContract || !hasPermission;
            queryBtn.disabled = !mainAddrValid || !hasValidAddrs || !currentAccount || !mainContract;
        }

        // 提交批量授权（调用 setBacthTheChiefaddr）
        async function submitBatchAuthorize() {
            if (!mainContract || !currentAccount || validAddresses.length === 0) {
                showStatus('请先解析有效地址并确保钱包已连接', 'error');
                return;
            }

            try {
                showStatus(`正在批量授权 ${validAddresses.length} 个地址...`, 'loading');
                submitBtn.disabled = true;

                // 调用批量授权函数
                const txObj = await mainContract.methods.setBacthTheChiefaddr(validAddresses)
                    .send({
                        from: currentAccount,
                        gas: 300000 + (validAddresses.length * 30000) // 动态计算Gas（每个地址约3万Gas）
                    });

                // 显示成功结果
                const txHash = txObj.transactionHash;
                const explorerUrl = `https://区块浏览器地址/tx/${txHash}`; // 替换为你的区块浏览器地址
                showStatus(`✅ 批量授权成功！共授权 ${validAddresses.length} 个地址<br>交易哈希：<a href="${explorerUrl}" target="_blank" class="text-primary underline">${txHash.slice(0, 10)}...${txHash.slice(-6)}</a>`, 'success');

                // 清空输入框和解析结果
                batchAddresses.value = '';
                addressList.innerHTML = '';
                validAddresses = [];
                validCount.textContent = '0';
                invalidCount.textContent = '0';
            } catch (error) {
                const errorMsg = error.message.includes('reverted') 
                    ? '授权失败（可能无权限或合约执行错误）' 
                    : error.message;
                showStatus(`❌ 批量授权失败：${errorMsg}`, 'error');
                console.error('授权错误:', error);
                submitBtn.disabled = false;
            }
        }

        // 查询已解析地址的授权状态
        async function queryAuthorizeStatus() {
            if (!mainContract || !currentAccount || validAddresses.length === 0) {
                showStatus('请先解析有效地址', 'error');
                return;
            }

            try {
                showStatus(`正在查询 ${validAddresses.length} 个地址的授权状态...`, 'loading');

                // 批量查询每个地址的授权状态
                const statusList = [];
                for (const addr of validAddresses) {
                    const isAuthorized = await mainContract.methods.referrers(addr).call();
                    statusList.push({ addr, isAuthorized });
                }

                // 显示查询结果
                let statusHtml = '📋 查询结果：<br>';
                statusList.forEach(item => {
                    const statusText = item.isAuthorized ? '✅ 已授权' : '❌ 未授权';
                    const statusClass = item.isAuthorized ? 'text-green-500' : 'text-red-500';
                    statusHtml += `- ${item.addr.slice(0, 10)}...${item.addr.slice(-4)}: <span class="${statusClass}">${statusText}</span><br>`;
                });

                showStatus(statusHtml, 'success');
            } catch (error) {
                showStatus(`❌ 查询失败：${error.message}`, 'error');
                console.error('查询错误:', error);
            }
        }

        // 连接钱包
        async function connectWallet() {
            if (!window.ethereum) {
                showStatus('未检测到钱包，请安装 MetaMask', 'error');
                return;
            }

            try {
                showStatus('正在连接钱包...', 'loading');
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                currentAccount = accounts[0];
                const chainIdHex = await window.ethereum.request({ method: 'eth_chainId' });
                const chainIdNum = web3.utils.hexToNumber(chainIdHex);

                // 更新UI
                walletAddr.textContent = currentAccount;
                chainId.textContent = chainIdNum;
                networkName.textContent = getNetworkName(chainIdNum);
                walletInfo.classList.remove('hidden');
                connectWalletBtn.textContent = '已连接';
                connectWalletBtn.disabled = true;

                // 初始化合约并检查权限
                await initMainContract();

                showStatus('钱包连接成功', 'success');
            } catch (error) {
                showStatus(`钱包连接失败：${error.message}`, 'error');
                console.error('连接钱包错误:', error);
            }
        }

        // 显示状态提示
        function showStatus(message, type) {
            statusContainer.classList.remove('hidden');
            statusContent.innerHTML = message; // 支持HTML格式

            // 移除所有状态类
            statusContent.classList.remove('status-success', 'status-error', 'status-loading');
            
            // 添加对应状态类
            if (type === 'success') {
                statusContent.classList.add('status-success');
            } else if (type === 'error') {
                statusContent.classList.add('status-error');
            } else {
                statusContent.classList.add('status-loading');
            }

            // 8秒后自动隐藏成功/错误提示
            if (type !== 'loading') {
                setTimeout(() => {
                    statusContainer.classList.add('hidden');
                }, 12000);
            }
        }
    </script>
